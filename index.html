<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CQ Score Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    body {
      background: #f4f4f4;
      font-family: sans-serif;
      margin: 0;
      padding: 12px;
    }

    h1, h2 {
      margin: 6px 0;
    }

    .header {
      margin-bottom: 16px;
    }

    .person {
      background: #111;
      color: white;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
    }

    .score {
      font-size: 16px;
      color: #dddddd;
    }

    .buttons button {
      font-size: 16px;
      margin-left: 6px;
      padding: 6px 10px;
    }

    .add-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 28px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #000;
      color: white;
    }

    /* Leaderboard colours */
    .rank-1 button { background: #39ff14; color: black; }
    .rank-2 button { background: #ff9800; color: black; }
    .rank-3 button { background: #ffeb3b; color: black; }
    .bottom-3 button { background: #e53935; color: white; }
  </style>
</head>

<body>

<div class="header">
  <h1>CQ Score Tracker</h1>
  <h2 id="meta"></h2>

  <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
    <button onclick="downloadImage()" style="
      background:#7b2ff7;
      color:white;
      padding:8px 14px;
      border:none;
      border-radius:6px;
      font-size:14px;
      cursor:pointer;
    ">
      📸 Download Leaderboard Image
    </button>
    <button onclick="finishQuiz()" style="
      background:#2e7d32;
      color:white;
      padding:8px 14px;
      border:none;
      border-radius:6px;
      font-size:14px;
      cursor:pointer;
    ">
      ✅ Finish Quiz
    </button>
  </div>
</div>

<div id="list"></div>

<button class="add-btn" onclick="addParticipant()">+</button>

<!-- Hidden canvas for image generation -->
<canvas id="shareCanvas" style="display:none;"></canvas>

<script>
/* ---------- INITIAL SETUP ---------- */

let edition = localStorage.getItem("edition");
let qm = localStorage.getItem("qm");

if (!edition) {
  do { edition = prompt("Enter edition number:"); }
  while (!/^\d+$/.test(edition));
  localStorage.setItem("edition", edition);
}

if (!qm) {
  do { qm = prompt("Enter QM name:"); }
  while (!/^[A-Za-z ]+$/.test(qm));
  localStorage.setItem("qm", qm);
}

document.getElementById("meta").innerText =
  "Edition " + edition + " | QM: " + qm;

/* ---------- DATA ---------- */

let participants = JSON.parse(localStorage.getItem("participants")) || [];

/* ---------- CORE FUNCTIONS ---------- */

function save() {
  localStorage.setItem("participants", JSON.stringify(participants));
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  participants.sort((a, b) => b.score - a.score);
  const total = participants.length;

  participants.forEach((p, i) => {
    let rankClass = "";
    if (i === 0) rankClass = "rank-1";
    else if (i === 1) rankClass = "rank-2";
    else if (i === 2) rankClass = "rank-3";
    else if (i >= total - 3) rankClass = "bottom-3";

    list.innerHTML += `
      <div class="person ${rankClass}">
        <div>
          <div class="name">#${i + 1} ${p.name}</div>
          <div class="score">Score: ${p.score}</div>
        </div>
        <div class="buttons">
          <button onclick="update(${i}, 20)">+20</button>
          <button onclick="update(${i}, -10)">-10</button>
          <button onclick="update(${i}, -5)">-5</button>
        </div>
      </div>`;
  });
}

function update(index, delta) {
  participants[index].score += delta;
  save();
  render();
}

function addParticipant() {
  let name;
  do { name = prompt("Enter participant name:"); }
  while (!name || !name.trim());
  participants.push({ name: name.trim(), score: 0 });
  save();
  render();
}

/* ---------- EXPORT: ZIP with CSV + PNG ---------- */

function buildCSVString() {
  const sorted = [...participants].sort((a, b) => b.score - a.score);
  let csv = "Edition,QM Name,Rank,Participant,Score\n";
  sorted.forEach((p, i) => {
    csv += `"${edition}","${qm}",${i + 1},"${p.name}",${p.score}\n`;
  });
  return csv;
}

function buildCanvas() {
  const sorted = [...participants].sort((a, b) => b.score - a.score);
  const top3 = sorted.slice(0, 3);

  const W = 1080, H = 1080;
  const canvas = document.getElementById("shareCanvas");
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext("2d");

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, "#0F0A1E");
  bgGrad.addColorStop(1, "#1A1030");
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  const blob1 = ctx.createRadialGradient(W, 0, 0, W, 0, 500);
  blob1.addColorStop(0, "rgba(196,77,255,0.25)");
  blob1.addColorStop(1, "transparent");
  ctx.fillStyle = blob1;
  ctx.fillRect(0, 0, W, H);

  const blob2 = ctx.createRadialGradient(0, H, 0, 0, H, 450);
  blob2.addColorStop(0, "rgba(255,61,119,0.2)");
  blob2.addColorStop(1, "transparent");
  ctx.fillStyle = blob2;
  ctx.fillRect(0, 0, W, H);

  // Header
  ctx.fillStyle = "rgba(255,255,255,0.12)";
  roundRect(ctx, W/2 - 200, 52, 400, 48, 24);
  ctx.fill();
  ctx.font = "bold 22px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.55)";
  ctx.textAlign = "center";
  ctx.fillText("CUBBON QUIZZES", W / 2, 84);

  const titleGrad = ctx.createLinearGradient(W * 0.2, 0, W * 0.8, 0);
  titleGrad.addColorStop(0, "#FF6B35");
  titleGrad.addColorStop(0.45, "#FF3D77");
  titleGrad.addColorStop(1, "#C44DFF");
  ctx.font = "bold 90px sans-serif";
  ctx.fillStyle = titleGrad;
  ctx.fillText("Leaderboard", W / 2, 200);

  const today = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
  const metaText = `Edition ${edition}  •  QM ${qm}  •  ${today}`;
  ctx.font = "26px sans-serif";
  const metaW = ctx.measureText(metaText).width + 48;
  ctx.fillStyle = "rgba(255,255,255,0.07)";
  roundRect(ctx, W/2 - metaW/2, 222, metaW, 44, 22);
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.fillText(metaText, W / 2, 251);

  // Medal cards
  const medals = [
    { emoji: "🥇", label: "1st Place", cardColor: "rgba(255,107,53,0.18)", border: "rgba(255,107,53,0.6)", scoreColor: "#FF6B35" },
    { emoji: "🥈", label: "2nd Place", cardColor: "rgba(196,77,255,0.18)", border: "rgba(196,77,255,0.6)", scoreColor: "#C44DFF" },
    { emoji: "🥉", label: "3rd Place", cardColor: "rgba(255,61,119,0.18)", border: "rgba(255,61,119,0.6)", scoreColor: "#FF3D77" },
  ];
  const cardX = 80, cardW = W - 160, cardH = 148, startY = 310, gap = 168;

  top3.forEach((p, i) => {
    const m = medals[i];
    const y = startY + i * gap;
    ctx.fillStyle = m.cardColor;
    roundRect(ctx, cardX, y, cardW, cardH, 20);
    ctx.fill();
    ctx.strokeStyle = m.border;
    ctx.lineWidth = 2;
    roundRect(ctx, cardX, y, cardW, cardH, 20);
    ctx.stroke();
    ctx.font = "64px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(m.emoji, cardX + 28, y + 88);
    ctx.font = "bold 38px sans-serif";
    ctx.fillStyle = "#FFFFFF";
    ctx.textAlign = "left";
    let name = p.name;
    while (ctx.measureText(name).width > cardW - 280 && name.length > 4) name = name.slice(0, -1);
    if (name !== p.name) name += "…";
    ctx.fillText(name, cardX + 110, y + 72);
    ctx.font = "bold 22px sans-serif";
    ctx.fillStyle = m.scoreColor;
    ctx.fillText(m.label, cardX + 110, y + 106);
    ctx.font = "bold 52px sans-serif";
    ctx.fillStyle = m.scoreColor;
    ctx.textAlign = "right";
    ctx.fillText(p.score, cardX + cardW - 28, y + 88);
  });

  ctx.font = "22px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.2)";
  ctx.textAlign = "center";
  ctx.fillText("cubbon.quizzes", W / 2, H - 44);

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* ---------- DOWNLOAD IMAGE ---------- */

function downloadImage() {
  if (participants.length === 0) {
    alert("No participants yet.");
    return;
  }
  const canvas = buildCanvas();
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `CQ_Leaderboard_Edition_${edition}.png`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }, "image/png");
}

/* ---------- FINISH QUIZ FLOW ---------- */

function finishQuiz() {
  if (participants.length === 0) {
    alert("No participants to finish quiz.");
    return;
  }

  const confirmEnd = confirm(
    "Are you sure you want to finish the quiz?\n\n" +
    "Scores CSV will download and the submission form will open."
  );

  if (!confirmEnd) return;

  // Download CSV
  const csvString = buildCSVString();
  const blob = new Blob([csvString], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `CQ_Scores_Edition_${edition}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);

  // Redirect to form
  setTimeout(() => {
    const googleFormUrl =
      "https://docs.google.com/forms/d/e/1FAIpQLScsXWxfhY3svlBMZMP-VuWx7HUMbu1cJjkjqYZJwGhZwJM-vg/viewform" +
      "?usp=pp_url" +
      "&entry.90836755=" + encodeURIComponent(edition) +
      "&entry.1791414375=" + encodeURIComponent(qm);
    window.location.href = googleFormUrl;
  }, 600);
}

render();

/* ---------- SERVICE WORKER ---------- */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
